name: Release CLI

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Publish @keyflare/cli to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm pkg set version="$VERSION"
        working-directory: packages/cli

      - name: Detect dist tag
        id: dist-tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ "$VERSION" == *-* ]]; then
            # Extract the pre-release identifier (e.g. "beta1" from "0.0.3-beta1", "rc1" from "0.0.3-rc1")
            PRERELEASE="${VERSION#*-}"
            # Strip trailing digits to get the tag name (e.g. "beta", "rc")
            TAG=$(echo "$PRERELEASE" | sed 's/[0-9]*$//' | sed 's/\.$//')
            # Fallback to "next" if tag is empty
            TAG=${TAG:-next}
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: publishing with --tag $TAG"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Stable release: publishing with --tag latest"
          fi

      - name: Publish CLI to npm
        run: pnpm publish packages/cli --no-git-checks --access public --tag ${{ steps.dist-tag.outputs.tag }} --provenance

      - name: Commit version update to source branch
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Tags don't carry branch info in a detached-HEAD checkout, so we
          # look for a remote branch that contains this tag commit and fall
          # back to "main" if none is found (the common case for trunk-based
          # release flows).
          BRANCH=$(git branch -r --contains HEAD 2>/dev/null \
            | grep -v 'HEAD' \
            | grep -o 'origin/[^ ]*' \
            | head -1 \
            | sed 's|origin/||')
          BRANCH=${BRANCH:-main}
          echo "Detected branch: $BRANCH"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          npm pkg set version="$VERSION" --workspace packages/cli
          git add packages/cli/package.json
          git commit -m "chore: bump CLI version to ${GITHUB_REF_NAME}"
          git push origin "$BRANCH"
